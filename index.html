<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tréninkový Deník - Příprava</title>
    <style>
        :root {
            --primary: #1E3A8A; /* Tmavě modrá z předlohy */
            --secondary: #3B82F6;
            --bg: #F3F4F6;
            --white: #FFFFFF;
            --text-main: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary);
            text-transform: uppercase;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .card-header {
            background: var(--primary);
            color: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            font-size: 1.5rem;
        }

        .card-header .day-badge {
            background: var(--white);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .focus-title {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 1.1rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            display: inline-block;
        }

        .training-list {
            list-style: none;
            margin-bottom: 25px;
        }

        .training-list li {
            margin-bottom: 12px;
            padding-left: 15px;
            border-left: 3px solid var(--secondary);
            font-size: 0.95rem;
        }

        .training-list li strong {
            display: block;
            color: var(--text-main);
        }

        .metrics-section {
            background: #F9FAFB;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .metrics-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-main);
            text-align: center;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .form-group input {
            width: 80px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
        }

        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            resize: vertical;
            min-height: 60px;
            margin-top: 5px;
        }

        .save-btn {
            width: 100%;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .save-btn:hover {
            background: var(--primary);
        }

        .saved-msg {
            color: var(--success);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 5px;
            min-height: 15px;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tréninkový Deník</h1>
        <h2>Příprava – Udržení kondice | 10 Denní Plán</h2>
    </header>

    <div class="container" id="app">
        </div>

    <script>
        // Data pro 10denní tréninkový plán vycházející z fotbalové přípravy
        const trainingData = [
            {
                day: 1,
                focus: "Lehký běh + Mobilita + Core",
                tasks: [
                    { time: "10 min", title: "Rozcvičení", desc: "Lehký klus, dynamické protažení, mobilita kloubů." },
                    { time: "30 min", title: "Hlavní část", desc: "Pohodové tempo (65-70% TFmax). Dýchat nosem." },
                    { time: "15 min", title: "Core", "desc": "Plank, dead bug, bird dog, zkracovačky." },
                    { time: "10 min", title: "Protažení", desc: "Statické protažení celého těla." }
                ]
            },
            {
                day: 2,
                focus: "Silový trénink s vlastní vahou",
                tasks: [
                    { time: "10 min", title: "Rozcvičení", desc: "Švihadlo, dynamický strečink, aktivace středu těla." },
                    { time: "40 min", title: "Hlavní část", desc: "Kruhový trénink (kliky, dřepy s výskokem, výpady, hip thrust). 4 kola." },
                    { time: "10 min", title: "Core", desc: "Plank variace, mountain climbers." },
                    { time: "10 min", title: "Protažení", desc: "Statické protažení zaměřené na nohy." }
                ]
            },
            {
                day: 3,
                focus: "Intervaly – Rychlost a vytrvalost",
                tasks: [
                    { time: "15 min", title: "Rozcvičení", desc: "Běžecká abeceda, rovinky na zahřátí." },
                    { time: "35 min", title: "Hlavní část", desc: "10x 200m sprint (80-85% max), pauza meziklusem 200m." },
                    { time: "10 min", title: "Výklus", desc: "Lehký klus + hluboké dýchání." },
                    { time: "10 min", title: "Protažení", desc: "Protažení se zaměřením na lýtka a hamstringy." }
                ]
            },
            {
                day: 4,
                focus: "Aktivní regenerace",
                tasks: [
                    { time: "45-60 min", title: "Aktivní pohyb", desc: "Plavání, jízda na kole nebo svižná chůze (intenzita 50-60%)." },
                    { time: "15 min", title: "Mobilita", desc: "Práce s pěnovým válcem (foam rolling), protažení ztuhlých partií." },
                    { time: "10 min", title: "Relaxace", desc: "Dýchací cvičení, uvolnění." }
                ]
            },
            {
                day: 5,
                focus: "Fotbalová obratnost + Sprinty",
                tasks: [
                    { time: "15 min", title: "Rozcvičení", desc: "Lehký klus, koordinace s míčem." },
                    { time: "30 min", title: "Hlavní část", desc: "Dribling mezi kužely, rychlé změny směru. Sprinty 5x20m plný plyn." },
                    { time: "10 min", title: "Střelba", desc: "Střelba na bránu z hranice vápna." },
                    { time: "15 min", title: "Výklus a Protažení", desc: "Lehký klus, statický strečink." }
                ]
            },
            {
                day: 6,
                focus: "Volno nebo lehká turistika",
                tasks: [
                    { time: "Volno", title: "Odpočinek", desc: "Dopřej tělu regeneraci, načerpej energii." },
                    { time: "Nebo", title: "Turistika", desc: "Lehká procházka v přírodě 60-120 min." },
                    { time: "15 min", title: "Protažení", desc: "Lehká večerní mobilita." }
                ]
            },
            {
                day: 7,
                focus: "Tempový běh + Core",
                tasks: [
                    { time: "15 min", title: "Rozcvičení", desc: "Lehký klus, dynamický strečink." },
                    { time: "30 min", title: "Tempový běh", desc: "Udržuj tempo na 75-80% TFmax. Rovnoměrné tempo." },
                    { time: "15 min", title: "Core", desc: "Russian twist, leg raises, boční plank." },
                    { time: "10 min", title: "Protažení", desc: "Statický strečink celého těla." }
                ]
            },
            {
                day: 8,
                focus: "Kruhový trénink",
                tasks: [
                    { time: "10 min", title: "Rozcvičení", desc: "Švihadlo, dynamická aktivace." },
                    { time: "40 min", title: "Kruháč", desc: "8 cviků, 40s práce / 20s pauza. 4 kola (pauza mezi koly 90s). Burpees, shyby, kliky..." },
                    { time: "10 min", title: "Protažení", desc: "Statické protažení, zaměření na vršek těla." }
                ]
            },
            {
                day: 9,
                focus: "Fartlek / Hra s rychlostí",
                tasks: [
                    { time: "15 min", title: "Rozcvičení", desc: "Lehký klus a dynamika." },
                    { time: "45 min", title: "Fartlek", desc: "Běh v terénu. Střídání tempa podle pocitu (např. sprint do kopce, volně po rovince)." },
                    { time: "10 min", title: "Výklus", desc: "Velmi volný klus." },
                    { time: "10 min", title: "Protažení", desc: "Důkladný statický strečink." }
                ]
            },
            {
                day: 10,
                focus: "Regenerační klus + Protažení",
                tasks: [
                    { time: "30 min", title: "Klus", desc: "Pohodové tempo, uvolnění svalů, koncentrace na dech." },
                    { time: "15 min", title: "Mobilita", desc: "Komplexní protažení celého těla." },
                    { time: "15 min", title: "Relaxace", desc: "Mentální uvolnění, zhodnocení bloku." }
                ]
            }
        ];

        const appContainer = document.getElementById('app');

        // Funkce pro vykreslení karet
        function renderApp() {
            trainingData.forEach(dayInfo => {
                // Vytvoření HTML pro úkoly
                let tasksHtml = dayInfo.tasks.map(task => 
                    `<li><strong>${task.time} - ${task.title}</strong> ${task.desc}</li>`
                ).join('');

                // Získání uložených dat (pokud existují)
                const savedData = JSON.parse(localStorage.getItem(`day_${dayInfo.day}`)) || { rpe: '', sleep: '', water: '', notes: '' };

                // Sestavení HTML karty
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3>DEN ${dayInfo.day}</h3>
                        <span class="day-badge">10 denní plán</span>
                    </div>
                    <div class="card-body">
                        <span class="focus-title">Zaměření: ${dayInfo.focus}</span>
                        <ul class="training-list">
                            ${tasksHtml}
                        </ul>

                        <div class="metrics-section">
                            <div class="metrics-title">Dnešní metriky</div>
                            <div class="form-group">
                                <label title="Rate of Perceived Exertion (1=lehké, 10=maximum)">Náročnost (RPE 1-10):</label>
                                <input type="number" min="1" max="10" id="rpe_${dayInfo.day}" value="${savedData.rpe}">
                            </div>
                            <div class="form-group">
                                <label>Spánek (hodiny):</label>
                                <input type="number" step="0.5" id="sleep_${dayInfo.day}" value="${savedData.sleep}">
                            </div>
                            <div class="form-group">
                                <label>Voda (litry):</label>
                                <input type="number" step="0.5" id="water_${dayInfo.day}" value="${savedData.water}">
                            </div>
                            <div class="form-group" style="flex-direction: column; align-items: flex-start;">
                                <label>Poznámky z tréninku:</label>
                                <textarea id="notes_${dayInfo.day}" placeholder="Jak ses dnes cítil?">${savedData.notes}</textarea>
                            </div>
                            <button class="save-btn" onclick="saveData(${dayInfo.day})">Uložit den ${dayInfo.day}</button>
                            <div class="saved-msg" id="msg_${dayInfo.day}"></div>
                        </div>
                    </div>
                `;
                appContainer.appendChild(card);
            });
        }

        // Funkce pro uložení dat do Local Storage
        function saveData(dayNum) {
            const rpeVal = document.getElementById(`rpe_${dayNum}`).value;
            const sleepVal = document.getElementById(`sleep_${dayNum}`).value;
            const waterVal = document.getElementById(`water_${dayNum}`).value;
            const notesVal = document.getElementById(`notes_${dayNum}`).value;

            const dayData = {
                rpe: rpeVal,
                sleep: sleepVal,
                water: waterVal,
                notes: notesVal
            };

            localStorage.setItem(`day_${dayNum}`, JSON.stringify(dayData));

            // Zobrazení potvrzovací zprávy
            const msgEl = document.getElementById(`msg_${dayNum}`);
            msgEl.textContent = "Úspěšně uloženo!";
            setTimeout(() => {
                msgEl.textContent = "";
            }, 3000);
        }

        // Spuštění aplikace po načtení
        renderApp();
    </script>
</body>
</html>
