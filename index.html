<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10denní tréninkový deník — Letní příprava</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --pitch-900:#0B2B1E;
    --pitch-700:#164a32;
    --pitch-500:#1f6b47;
    --lime:#B6E33D;
    --lime-dim:#93bf2c;
    --chalk:#F4F2E9;
    --chalk-dim:#dad6c6;
    --navy:#0B1F3A;
    --amber:#FFB703;
    --ink:#132018;
    --line: rgba(244,242,233,0.14);
  }
  *{box-sizing:border-box;}
  html,body,#root{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(182,227,61,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(255,183,3,0.06), transparent 55%),
      var(--pitch-900);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:0.02em;}
  .mono{font-family:'JetBrains Mono',monospace;}

  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

  /* HERO */
  .hero{
    display:flex; flex-wrap:wrap; gap:24px; align-items:flex-end; justify-content:space-between;
    padding:30px 0 26px; border-bottom:1px solid var(--line); margin-bottom:28px;
  }
  .hero-left .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12.5px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--lime); font-weight:600; margin-bottom:10px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);}
  .hero h1{
    font-size:clamp(38px,6vw,64px); line-height:0.95; margin:0 0 10px; font-weight:800;
  }
  .hero h1 span{color:var(--lime);}
  .hero p{max-width:520px; color:var(--chalk-dim); font-size:15px; line-height:1.55; margin:0;}

  .score-panel{
    background:linear-gradient(160deg, var(--pitch-700), var(--pitch-900));
    border:1px solid var(--line); border-radius:16px; padding:18px 22px; min-width:230px;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .score-panel .label{font-size:11.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--chalk-dim); margin-bottom:6px;}
  .score-panel .value{display:flex; align-items:baseline; gap:8px;}
  .score-panel .value b{font-family:'Barlow Condensed',sans-serif; font-size:46px; font-weight:800; color:var(--lime);}
  .score-panel .value span{color:var(--chalk-dim); font-size:15px;}
  .score-track{height:6px; border-radius:4px; background:rgba(244,242,233,0.12); margin-top:12px; overflow:hidden;}
  .score-fill{height:100%; background:linear-gradient(90deg, var(--amber), var(--lime)); border-radius:4px; transition:width .4s ease;}

  /* TOOLBAR */
  .toolbar{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px;}
  .btn{
    border:1px solid var(--line); background:rgba(244,242,233,0.04); color:var(--chalk);
    padding:9px 16px; border-radius:9px; font-size:13.5px; font-weight:600; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; transition:.15s ease;
  }
  .btn:hover{background:rgba(244,242,233,0.09); border-color:rgba(244,242,233,0.3);}
  .btn.primary{background:var(--lime); color:var(--pitch-900); border-color:var(--lime);}
  .btn.primary:hover{background:var(--lime-dim);}

  /* GRID of days */
  .day-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px;}

  .card{
    background:rgba(244,242,233,0.035);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px 18px 16px;
    display:flex; flex-direction:column; gap:12px;
    transition:border-color .2s ease, transform .2s ease;
    position:relative;
    overflow:hidden;
  }
  .card.done{border-color:rgba(182,227,61,0.55);}
  .card.done::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(160deg, rgba(182,227,61,0.08), transparent 45%);
  }
  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .day-badge{
    display:flex; align-items:center; gap:10px;
  }
  .num{
    font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:30px;
    width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--navy); border:1px solid var(--line); color:var(--chalk); flex:none;
  }
  .card.done .num{background:var(--lime); color:var(--pitch-900); border-color:var(--lime);}
  .day-titles .day-of{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--chalk-dim);}
  .day-titles h3{margin:2px 0 0; font-size:20px; font-weight:700; line-height:1.15;}
  .focus-tag{
    display:inline-block; margin-top:6px; font-size:11.5px; font-weight:600;
    padding:4px 9px; border-radius:999px; background:rgba(182,227,61,0.12); color:var(--lime);
    border:1px solid rgba(182,227,61,0.3);
  }
  .desc{font-size:13px; color:var(--chalk-dim); line-height:1.5;}

  .expand-btn{
    align-self:flex-start; background:none; border:none; color:var(--lime); font-size:13px; font-weight:600;
    cursor:pointer; padding:0; display:flex; align-items:center; gap:6px;
  }

  .sections{display:flex; flex-direction:column; gap:8px; margin-top:2px;}
  .section-row{
    display:flex; gap:10px; align-items:flex-start; padding:9px 10px; border-radius:9px;
    background:rgba(11,31,58,0.35); border:1px solid var(--line);
  }
  .section-row label{display:flex; gap:10px; align-items:flex-start; cursor:pointer; width:100%;}
  .section-row input[type=checkbox]{
    margin-top:2px; width:16px; height:16px; accent-color:var(--lime); flex:none; cursor:pointer;
  }
  .section-row .time{font-size:11px; color:var(--lime); font-weight:700; white-space:nowrap; min-width:44px;}
  .section-row .t-title{font-size:13.5px; font-weight:600;}
  .section-row .t-detail{font-size:12px; color:var(--chalk-dim); margin-top:2px; line-height:1.4;}
  .section-row.checked .t-title{text-decoration:line-through; color:var(--chalk-dim);}

  .rating-row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:2px;}
  .rating-row .label{font-size:12px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:0.08em;}
  .rating-dots{display:flex; gap:4px;}
  .rdot{width:16px; height:16px; border-radius:4px; border:1px solid var(--line); cursor:pointer; background:transparent;}
  .rdot.on{background:var(--amber); border-color:var(--amber);}

  textarea.notes{
    width:100%; min-height:54px; resize:vertical; background:rgba(11,31,58,0.35);
    border:1px solid var(--line); border-radius:9px; color:var(--chalk); font-family:'Inter',sans-serif;
    font-size:12.5px; padding:8px 10px; line-height:1.4;
  }
  textarea.notes::placeholder{color:rgba(244,242,233,0.35);}

  .tip{
    font-size:12px; color:var(--chalk-dim); background:rgba(255,183,3,0.06);
    border:1px solid rgba(255,183,3,0.22); border-radius:9px; padding:8px 10px; line-height:1.45;
  }
  .tip b{color:var(--amber);}

  .footer-note{margin-top:40px; padding-top:20px; border-top:1px solid var(--line); font-size:12px; color:var(--chalk-dim); text-align:center;}

  input[type=file]{display:none;}

  @media (max-width:520px){
    .hero{flex-direction:column; align-items:flex-start;}
    .score-panel{width:100%;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef} = React;

const DAYS = [
  {
    id:1, title:"Lehký běh + mobilita + core", focus:"Aktivace",
    desc:"Cílem prvního dne je rozhýbat tělo, aktivovat svaly, zlepšit celkovou pohyblivost a připravit tělo na dalších 9 dní.",
    tip:"Dnešní klíč: netlačit na výkon. Cílem je nastartovat tělo a najít rytmus, ve kterém zvládneš celý blok.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Lehký klus, dynamický strečink, rozhýbání kloubů."},
      {t:"30 min", title:"Lehký běh", d:"Rovnoměrné tempo (65–70 % TFmax), dýchat nosem, udržet rytmus."},
      {t:"10 min", title:"Mobilita", d:"Dynamické protažení celého těla, aktivace svalů."},
      {t:"15 min", title:"Core", d:"Plank, boční plank, dead bug, bird dog."},
      {t:"10 min", title:"Protažení", d:"Statické protažení celého těla po tréninku."},
    ],
  },
  {
    id:2, title:"Silový trénink s vlastní vahou", focus:"Síla",
    desc:"Posílení celého těla, zlepšení síly, stability a koordinace. Zaměř se na techniku a kontrolu pohybu.",
    tip:"Kvalita před kvantitou — pomalá a kontrolovaná fáze pohybu dá víc než rychlé, nedbalé opakování.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Dynamický strečink, aktivace kloubů."},
      {t:"40 min", title:"Kruhový trénink", d:"4 kola: dřepy 13–15x, kliky 13–15x, výpady 12x/nohu, plank 40–60 s. Pauza mezi koly 60–90 s."},
      {t:"10 min", title:"Core", d:"Plank varianace, mountain climbers, boční plank."},
      {t:"10 min", title:"Protažení", d:"Statické protažení celého těla."},
    ],
  },
  {
    id:3, title:"Intervaly — rychlost a vytrvalost", focus:"Rychlost",
    desc:"Krátké intenzivní úseky pro zlepšení rychlosti, anaerobní kapacity a celkové kondice.",
    tip:"Hlídej si techniku doběhu i ve vysoké intenzitě — únava kazí formu jako první.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Lehký běh, dynamický strečink, rozběhání."},
      {t:"20–35 min", title:"Hlavní část", d:"10 × 200 m (80–85 % max), mezi klusy zpět (200 m), pauza 60–90 s mezi opakováními."},
      {t:"10 min", title:"Vyklusání", d:"Lehký klus, hluboké dýchání."},
      {t:"10 min", title:"Protažení", d:"Statické protažení celého těla."},
    ],
  },
  {
    id:4, title:"Aktivní regenerace", focus:"Regenerace",
    desc:"Odpočinek pro tělo i mysl. Podpora regenerace, zlepšení cirkulace a snížení svalového napětí.",
    tip:"Regenerace je součást tréninku — dej tělu klid, ale zůstaň v pohybu na nízké intenzitě.",
    tasks:[
      {t:"60 min", title:"Aktivní pohyb", d:"Plavání, jízda na kole nebo chůze v kopcovitém terénu — udržuj intenzitu (35–60 %)."},
      {t:"10 min", title:"Mobilita", d:"Protažení celého těla, zaměř se na ztuhlé partie."},
      {t:"10 min", title:"Relaxace", d:"Dechové cvičení, volný pohyb, masáž / válec."},
    ],
  },
  {
    id:5, title:"Fotbalová obratnost + sprinty", focus:"Obratnost",
    desc:"Zlepšení výbušnosti, obratnosti, reakce a práce s míčem.",
    tip:"Technika a rychlost nohou v obratnosti pomohou i mimo hřiště — udrž si výbušnost.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Lehký klus, dynamický strečink, koordinace."},
      {t:"30 min", title:"Hlavní část", d:"Driblink mezi kužely, přihrávky na přesnost, sprinty 8 × 20 m (plný sprint, pauza 60–90 s)."},
      {t:"10 min", title:"Vyklusání", d:"Lehký klus."},
      {t:"10 min", title:"Protažení", d:"Statické protažení."},
    ],
  },
  {
    id:6, title:"Volno nebo lehká turistika", focus:"Volno",
    desc:"Doplň tělu regeneraci, načerpej energii a užij si aktivní odpočinek v přírodě.",
    tip:"Dej tělu i hlavě oddych — dnešek má být příjemný, ne výkonnostní.",
    tasks:[
      {t:"60–120 min", title:"Volno / lehká turistika", d:"Lehká intenzita, kopcovitý terén podle chuti."},
      {t:"10–15 min", title:"Mobilita / protažení", d:"Volitelně, podle pocitu."},
    ],
  },
  {
    id:7, title:"Tempový běh + core", focus:"Vytrvalost",
    desc:"Zlepšení aerobní vytrvalosti a mentální odolnosti.",
    tip:"Drž tempo, které zvládneš udržet celých 30 minut — konzistence je tu důležitější než rychlost.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Lehký klus, dynamický strečink."},
      {t:"30 min", title:"Tempový běh", d:"Udržuj tempo na 75–80 % TFmax, rovnoměrný rytmus."},
      {t:"10 min", title:"Vyklusání", d:"Lehký klus."},
      {t:"15 min", title:"Core + stabilizace", d:"Plank varianty, rotační twist, leg raises, side plank."},
      {t:"10 min", title:"Protažení", d:"Statické protažení."},
    ],
  },
  {
    id:8, title:"Kruhový trénink", focus:"Síla",
    desc:"Zlepšení síly, vytrvalosti a celkové kondice.",
    tip:"Kombinace síly a vytrvalosti — nepodceňuj pauzy mezi kruhy, ať zvládneš kvalitu do konce.",
    tasks:[
      {t:"10 min", title:"Rozcvičení", d:"Lehký klus, dynamický strečink."},
      {t:"40 min", title:"Kruhový trénink", d:"8 cviků × 40 s práce / 20 s pauza, 4 kola: dřepy, kliky, výpady, přítahy (TRX / pod stolem), mountain climbers, burpees, plank, skoky na místě."},
      {t:"10 min", title:"Protažení", d:"Statické protažení celého těla."},
    ],
  },
  {
    id:9, title:"Fartlek / příroda", focus:"Vytrvalost",
    desc:"Střídání tempa v terénu nebo na pláži pro zlepšení rychlosti a vydrže.",
    tip:"Nech tempo diktovat terén — kopce, pláž nebo cesta v přírodě jsou ideální přirozený interval.",
    tasks:[
      {t:"15 min", title:"Rozcvičení", d:"Lehký klus, dynamický strečink."},
      {t:"45 min", title:"Fartlek", d:"Střídej tempo 2–3 min rychle / 1–2 min pomalu, udržuj intenzitu 70–85 % TFmax."},
      {t:"10 min", title:"Vyklusání", d:"Lehký klus."},
      {t:"10 min", title:"Protažení", d:"Statické protažení."},
    ],
  },
  {
    id:10, title:"Regenerační klus + protažení", focus:"Uzavření bloku",
    desc:"Lehký pohyb, protažení a regenerace celého těla. Uzavři těchto 10 dní s dobrým pocitem.",
    tip:"Zhodnoť si celý blok — co fungovalo, co příště uprav, a odjeď na dovolenou s klidnou hlavou.",
    tasks:[
      {t:"15 min", title:"Lehký klus", d:"Pohodové tempo, volnější uvolnění, koncentrace na dech."},
      {t:"15 min", title:"Mobilita", d:"Protažení celého těla, zaměř se na ztuhlé partie."},
      {t:"15 min", title:"Relaxace", d:"Dechové cvičení, relaxace, mentální uvolnění."},
    ],
  },
];

function emptyState(){
  const s = {};
  DAYS.forEach(day=>{
    s[day.id] = {
      tasks: day.tasks.map(()=>false),
      notes:"",
      rating:0,
    };
  });
  return s;
}

function App(){
  const [state, setState] = useState(emptyState());
  const [expanded, setExpanded] = useState(()=>new Set([1]));
  const fileRef = useRef(null);

  const toggleTask = (dayId, idx) => {
    setState(prev=>{
      const day = {...prev[dayId]};
      const tasks = [...day.tasks];
      tasks[idx] = !tasks[idx];
      day.tasks = tasks;
      return {...prev, [dayId]: day};
    });
  };

  const setNotes = (dayId, val) => {
    setState(prev=>({...prev, [dayId]: {...prev[dayId], notes: val}}));
  };

  const setRating = (dayId, val) => {
    setState(prev=>({
      ...prev,
      [dayId]: {...prev[dayId], rating: prev[dayId].rating === val ? val - 1 : val}
    }));
  };

  const toggleExpand = (dayId) => {
    setExpanded(prev=>{
      const next = new Set(prev);
      next.has(dayId) ? next.delete(dayId) : next.add(dayId);
      return next;
    });
  };

  const isDayDone = (dayId) => state[dayId].tasks.every(Boolean) && state[dayId].tasks.length>0;
  const doneCount = DAYS.filter(d=>isDayDone(d.id)).length;
  const totalScore = DAYS.reduce((sum,d)=> sum + (state[d.id].rating||0), 0);

  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `treninkovy-denik-${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try{
        const parsed = JSON.parse(ev.target.result);
        setState(prev=>({...prev, ...parsed}));
      }catch(err){
        alert("Soubor se nepodařilo načíst — zkontroluj, že jde o export z tohoto deníku.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const resetAll = () => {
    if(confirm("Opravdu vymazat všechny zaškrtnuté úkoly, poznámky a hodnocení?")){
      setState(emptyState());
    }
  };

  return (
    <div className="wrap">
      <div className="hero">
        <div className="hero-left">
          <div className="eyebrow"><span className="dot"></span>Letní příprava · 10 dní</div>
          <h1>Tréninkový<br/><span>deník</span></h1>
          <p>Desetidenní plán přípravy a udržení kondice před dovolenou — běh, síla, rychlost, obratnost a regenerace v jednom bloku.</p>
        </div>
        <div className="score-panel">
          <div className="label">Splněné dny</div>
          <div className="value"><b>{doneCount}</b><span>/ 10</span></div>
          <div className="score-track"><div className="score-fill" style={{width:`${doneCount*10}%`}}></div></div>
          <div className="label" style={{marginTop:14}}>Celkové hodnocení</div>
          <div className="value"><b>{totalScore}</b><span>/ 100</span></div>
        </div>
      </div>

      <div className="toolbar">
        <button className="btn primary" onClick={exportData}>⬇ Uložit průběh (JSON)</button>
        <button className="btn" onClick={()=>fileRef.current.click()}>⬆ Načíst uložený průběh</button>
        <input ref={fileRef} type="file" accept="application/json" onChange={importData} />
        <button className="btn" onClick={resetAll}>↺ Vynulovat vše</button>
      </div>

      <div className="day-grid">
        {DAYS.map(day=>{
          const ds = state[day.id];
          const done = isDayDone(day.id);
          const isOpen = expanded.has(day.id);
          return (
            <div className={"card" + (done ? " done" : "")} key={day.id}>
              <div className="card-top">
                <div className="day-badge">
                  <div className="num">{day.id}</div>
                  <div className="day-titles">
                    <div className="day-of">Den {day.id} / 10</div>
                    <h3>{day.title}</h3>
                    <span className="focus-tag">{day.focus}</span>
                  </div>
                </div>
              </div>

              <div className="desc">{day.desc}</div>

              <button className="expand-btn" onClick={()=>toggleExpand(day.id)}>
                {isOpen ? "▲ Skrýt tréninkový plán" : "▼ Zobrazit tréninkový plán"}
              </button>

              {isOpen && (
                <div className="sections">
                  {day.tasks.map((task, idx)=>(
                    <div className={"section-row" + (ds.tasks[idx] ? " checked" : "")} key={idx}>
                      <label>
                        <input type="checkbox" checked={ds.tasks[idx]} onChange={()=>toggleTask(day.id, idx)} />
                        <div>
                          <span className="time">{task.t}</span>{" "}
                          <span className="t-title">{task.title}</span>
                          <div className="t-detail">{task.d}</div>
                        </div>
                      </label>
                    </div>
                  ))}
                </div>
              )}

              <div className="rating-row">
                <span className="label">Hodnocení dne</span>
                <div className="rating-dots">
                  {Array.from({length:10}).map((_,i)=>(
                    <button
                      key={i}
                      className={"rdot" + (i < ds.rating ? " on" : "")}
                      onClick={()=>setRating(day.id, i+1)}
                      aria-label={`Hodnocení ${i+1}`}
                    ></button>
                  ))}
                </div>
              </div>

              <textarea
                className="notes"
                placeholder="Poznámky k tréninku…"
                value={ds.notes}
                onChange={(e)=>setNotes(day.id, e.target.value)}
              />

              <div className="tip"><b>Tip na dnes:</b> {day.tip}</div>
            </div>
          );
        })}
      </div>

      <div className="footer-note">
        Data se ukládají jen v tomto prohlížeči během relace. Použij „Uložit průběh“ pro export a „Načíst uložený průběh“ pro obnovení příště.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
